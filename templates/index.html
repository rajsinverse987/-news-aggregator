<!DOCTYPE html>
<html>
<head>
    <title>News Aggregator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        input {
            padding: 12px;
            width: 60%;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>📰 News Aggregator</h1>
    <p>Search any topic and see sentiment analysis!</p>

    <form action="/search" method="GET">
        <input type="text" name="topic" 
               placeholder="Search news... e.g. cricket, AI, India" 
               required>
        <button type="submit">Search</button>
    </form>
</body>
</html>
